server:
  port: 8087

spring:
  application:
    name: estado

  datasource:
    url: ${ESTADO_DB_URL:jdbc:postgresql://ep-dark-flower-acxgvu5x-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require}
    username: ${ESTADO_DB_USER:neondb_owner}
    password: ${ESTADO_DB_PASS:npg_8DrnxkMa1gcj}
