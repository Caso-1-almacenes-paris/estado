server:
  port: 8087

spring:
  application:
    name: estado

  # BD INDEPENDIENTE de estado (base "estadodb" en Neon)
  datasource:
    url: ${ESTADO_DB_URL:jdbc:postgresql://ep-mute-band-anlf1eyt-pooler.c-6.us-east-1.aws.neon.tech/estadodb?sslmode=require}
    username: ${ESTADO_DB_USER:neondb_owner}
    password: ${ESTADO_DB_PASS:npg_TrxfdWBpS47F}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  ventas:
    url: ${VENTAS_URL:http://localhost:8085}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
